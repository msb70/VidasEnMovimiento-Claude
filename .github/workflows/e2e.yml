name: E2E (Playwright + accesibilidad)

# Suite de extremo a extremo contra el sitio en vivo. NO bloquea el deploy
# (eso sería circular: el deploy actualiza el sitio que el E2E prueba).
# Se ejecuta a demanda y como smoke periódico.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'   # lunes 07:00 UTC — smoke semanal contra producción

jobs:
  e2e:
    name: E2E contra vidasenmovimiento.com
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        working-directory: e2e
        run: npm install --no-audit --no-fund

      - name: Instalar navegador (Chromium)
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Ejecutar E2E
        working-directory: e2e
        env:
          BASE_URL: https://vidasenmovimiento.com
          # Si no defines estos secrets, las pruebas usan las cuentas demo por defecto.
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_OPERATOR_EMAIL: ${{ secrets.E2E_OPERATOR_EMAIL }}
          E2E_OPERATOR_PASSWORD: ${{ secrets.E2E_OPERATOR_PASSWORD }}
        run: npm test

      - name: Subir reporte HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
