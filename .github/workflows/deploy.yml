name: CI/CD — Pruebas + Deploy a Hostinger

# En cada push a main: primero corre las pruebas (RLS, funciones, edge, integridad).
# Solo si pasan, publica los archivos web a la rama `deploy`.
# Hostinger (hPanel -> Git) auto-despliega esa rama a public_html.
#
# Secrets requeridos (Settings -> Secrets and variables -> Actions):
#   Pruebas:  SUPABASE_SERVICE_ROLE_KEY
#   Deploy:   ninguno (usa el GITHUB_TOKEN integrado para empujar a la rama deploy).
# Ya NO se usan FTP_SERVER / FTP_USERNAME / FTP_PASSWORD / FTP_SERVER_DIR.
# Ver docs/ci-cd.md.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: cicd-main
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  test:
    name: Pruebas (RLS · funciones · edge · integridad)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'   # 22 LTS trae WebSocket nativo (requerido por supabase-js)

      - name: Validar sintaxis de JS
        run: |
          node --check lib.js
          node --check app.js
          node --check supabase-data.js
          node --check mockData.js
          node --check supabase-config.js

      - name: Instalar dependencias de pruebas
        working-directory: tests
        run: npm install --no-audit --no-fund

      - name: Ejecutar pruebas
        working-directory: tests
        env:
          # Públicos (no sensibles)
          SUPABASE_URL: https://izcqcnunryhntojhxywu.supabase.co
          SUPABASE_ANON_KEY: sb_publishable__LIveg146Avk4WSUp3WjWA_G55IhbYa
          # Secreto del repositorio
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Fixtures de prueba (no sensibles)
          TEST_ADMIN_EMAIL: test-admin@viamovimiento.test
          TEST_ADMIN_PASSWORD: Test-Admin-2026!
          TEST_OPERATOR_EMAIL: test-operator@viamovimiento.test
          TEST_OPERATOR_PASSWORD: Test-Operator-2026!
          TEST_OPERATOR_ORG: ORG12
          # Las pruebas que ESCRIBEN se mantienen apagadas (solo lectura contra prod).
          TEST_ALLOW_WRITES: 'false'
        run: npm test

  # ─────────────────────────────────────────────────────────────
  # Publica SOLO los archivos web a la rama `deploy`.
  # Hostinger (hPanel -> Git) queda conectado a esa rama con auto-deploy,
  # así que cada push a main -> pruebas -> rama deploy -> sitio actualizado.
  # Sin FTP, sin tokens externos: usa el GITHUB_TOKEN integrado.
  publish:
    name: Publicar a rama deploy (Hostinger auto-deploy)
    needs: [ test ]          # ← gate: solo publica si las pruebas pasan
    runs-on: ubuntu-latest
    permissions:
      contents: write        # necesario para empujar a la rama deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar artefactos estáticos (solo archivos web)
        run: |
          mkdir -p dist
          cp index.html lib.js app.js styles.css mockData.js supabase-config.js supabase-data.js dist/
          cp -r assets dist/
          echo "Contenido a publicar:" && find dist -type f | sort

      - name: Publicar dist/ a la rama deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token:  ${{ secrets.GITHUB_TOKEN }}
          publish_dir:   ./dist
          publish_branch: deploy
          force_orphan:  true        # la rama deploy queda limpia, solo con los archivos web
          commit_message: "deploy: publicar build estático desde ${{ github.sha }}"
